name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Explicit trigger. Used by accept-submission.yml to fire CI on
  # bot-authored PR branches — GITHUB_TOKEN pushes normally don't cascade
  # into other workflows (infinite-loop prevention), but workflow_dispatch
  # is exempt from that rule.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test moderation scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Test
        run: npm test
