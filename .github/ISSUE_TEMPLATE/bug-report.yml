name: App bug report
description: Something in the Buzzer app isn't working right.
title: '[Bug] '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! The more detail you can give the faster it can be fixed.

  - type: textarea
    id: describe
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do just before the bug happened? (One step per line is fine.)
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: e.g. Chrome 122 on Windows 11
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Buzzer version
      description: If you downloaded a release, its version. If you're on the hosted site, say "hosted".
      placeholder: e.g. v0.2.0 or "hosted"
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Screenshots or notes (optional)
